services:
  - type: web
    name: fitnessnavigator
    env: python
    buildCommand: cd FitnessNavigator && pip install -r requirements.txt
    startCommand: cd FitnessNavigator && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
